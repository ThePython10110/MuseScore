name: Automatic Batch Conversion
run-name: ${{github.actor}} started a batch conversion job.
on: push
jobs:
  Batch-Convert:
    runs-on: windows-latest
    steps:
      - name: Set up NodeJS
        uses: actions/setup-node@v3
      - name: Checkout repository
        uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
      - name: Download MuseScore
        run: Invoke-WebRequest -URI https://github.com/musescore/MuseScore/releases/download/v3.6.2/MuseScore-3.6.2.548021803-x86_64.msi -OutFile MuseScoreInstaller.msi
      - name: Install MuseScore
        run: .\MuseScoreInstaller.msi
      - name: Install MIDIflip (NodeJS)
        run: npm install midiflip
      - name: Convert!
        run: python batch_convert.py
