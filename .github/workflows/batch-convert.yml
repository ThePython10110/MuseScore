name: Automatic Batch Conversion
run-name: ${{github.actor}} started a batch conversion job.
on: push
jobs:
  Batch-Convert:
    runs-on: windows-latest
    steps:
      - name: Set up NodeJS
        uses: actions/setup-node@v3
      - name: Checkout repository
        uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
      - name: Download MuseScore Portable
        run: Invoke-WebRequest -URI https://portableapps.com/downloading/?a=MuseScorePortable&s=s&p=&d=pa&n=MuseScore%20Portable&f=MuseScorePortable_3.6.2.paf.exe -OutFile MuseScoreInstaller.exe
      - name: Install MuseScore Portable
        run: MuseScoreInstaller.exe
      - name: Install MIDIflip (NodeJS)
        run: npm install midiflip
      - name: List files (to hopefully find MuseScore portable)
        run: ls
      - name: Convert!
        run: python batch_convert.py
