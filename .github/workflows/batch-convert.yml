name: Batch Convert Github Actions Test
run-name: ${{github.actor}} started a batch convert.
on: [push]
jobs:
  Convert:
    runs-on: ubuntu-latest
    steps:
      - name: Set up NodeJS
        uses: actions/setup-node@v3
      - name: Checkout repository
        uses: actions/checkout@v3
      - name: Install various apt packages so MuseScore works
        run: sudo apt install libfuse2
      - name: Download MuseScore 3.6.2 (GitHub AppImage)
        run: curl -L -o ./MuseScore.AppImage "https://github.com/musescore/MuseScore/releases/download/v3.6.2/MuseScore-3.6.2.548021370-x86_64.AppImage"
      - name: Make AppImage executable
        run: chmod +x MuseScore.AppImage
      - name: Install MuseScore
        run: sudo ./MuseScore.AppImage install
      - name: Find MuseScore
        run: sudo find /usr/local name mscore | grep mscore
      - name: Install MIDIflip (NodeJS)
        run: npm install midiflip
      - name: Prepare JSON file
        run: python batch_convert_linux.py
      - name: Convert MuseScore files
        run: /usr/local/bin/mscore -j convert_job3.json
      - name: MIDIflip
        run: midiflip midiflip -i "./MIDI/**/*.midi" -o "Output/FlippedMIDI"
